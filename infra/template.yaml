AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  API Gateway + Lambda + S3 + CloudFront for the BSBA Freshman Scheduling
  Tool. AdvisorFunction serves the schedule "what-if" advisor (OpenAI-backed,
  grounded in a precomputed degree-roadmap/prerequisite dataset stored in
  DataBucket -- see api/handlers/advisor.py and advisor/roadmap.py).
  FrontendBucket hosts the static site in frontend/web/ (schedule_engine
  artifacts + the advisor UI), served through CloudFront for a clean HTTPS
  URL -- the bucket itself is private, readable only via Origin Access
  Control from that one distribution. CodeUri is the repo root so the Lambda
  can import the sibling `advisor`/`mining` packages unchanged.

Parameters:
  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    Description: >
      OpenAI model invoked by advisor/llm_openai.py. Overridable per-stage
      without a redeploy of application code.

Globals:
  Function:
    Runtime: python3.13
    CodeUri: ../
    Timeout: 30
    MemorySize: 512
  Api:
    # Preflight (OPTIONS) support for the static frontend in frontend/web/,
    # which calls this API cross-origin from the CloudFront-served frontend.
    # The actual GET/POST responses still need Access-Control-Allow-Origin
    # set by the Lambda itself (Lambda proxy integration doesn't inject
    # headers into non-preflight responses) — see CORS_HEADERS in
    # api/handlers/advisor.py.
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type'"
      AllowMethods: "'GET,POST,OPTIONS'"
    # Cheap defense-in-depth against automated prompt-injection probing or
    # runaway cost (each request calls the OpenAI API, which is billed):
    # caps the whole stage well above normal interactive use.
    MethodSettings:
      - ResourcePath: "/*"
        HttpMethod: "*"
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10

Resources:
  # Precomputed data AdvisorFunction reads at call time via boto3 (see
  # api/handlers/_data.py) instead of bundling it into the Lambda zip:
  # roadmap_advisor.json (advisor/build_data.py) and, for the local-only
  # Streamlit tool's benefit, recommendation.json (mining/co_occurrence.py).
  # Private -- only the Lambda's execution role can read it.
  DataBucket:
    Type: AWS::S3::Bucket

  # Origin storage for frontend/web/ (schedule_engine artifacts + the
  # advisor UI). Fully private -- default S3 public-access-block settings
  # apply (no overrides needed); the only reader is the CloudFront
  # distribution below, via Origin Access Control.
  FrontendBucket:
    Type: AWS::S3::Bucket

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution.Id}"

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-frontend-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Explicit cache policy rather than a hardcoded AWS managed-policy ID, so
  # the TTLs are visible here instead of a magic UUID. infra/deploy.sh
  # invalidates on every deploy, so these TTLs mainly matter for
  # between-deploy traffic, not for how fast an update becomes visible.
  FrontendCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-frontend-cache"
        DefaultTTL: 300
        MaxTTL: 3600
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        # US/Canada/Europe only -- this is a CSUB-only tool, no need to pay
        # for the full global edge network.
        PriceClass: PriceClass_100
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: !Ref FrontendCachePolicy
        # This is a plain multi-page static site (no client-side router), so
        # these just make a typo'd path show the app shell instead of a bare
        # CloudFront/S3 error page -- not SPA fallback routing.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # Holds the OpenAI API key. Created with a placeholder value -- the real
  # key is never a CloudFormation parameter (which would persist it in the
  # stack's parameter history). Populate it once, out-of-band, with
  # infra/set_openai_key.sh after the first deploy.
  OpenAIApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: >
        OpenAI API key for AdvisorFunction. Populate with
        infra/set_openai_key.sh -- never put the real key in this template.
      SecretString: '{"OPENAI_API_KEY":"REPLACE_ME"}'

  AdvisorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api.handlers.advisor.handler
      Environment:
        Variables:
          OPENAI_MODEL: !Ref OpenAIModel
          OPENAI_SECRET_ARN: !Ref OpenAIApiKeySecret
          DATA_BUCKET: !Ref DataBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref OpenAIApiKeySecret
        - Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub "${DataBucket.Arn}/*"
      Events:
        PostAdvisor:
          Type: Api
          Properties:
            Path: /advisor
            Method: post

Outputs:
  ApiUrl:
    Description: Base invoke URL for the deployed stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  DataBucketName:
    Description: >
      S3 bucket holding precomputed data (roadmap_advisor.json,
      recommendation.json) that AdvisorFunction/local tools read.
      infra/deploy.sh uploads to it.
    Value: !Ref DataBucket
  FrontendBucketName:
    Description: S3 bucket for the static frontend. infra/deploy.sh syncs frontend/web/ here.
    Value: !Ref FrontendBucket
  FrontendUrl:
    Description: CloudFront URL for the frontend -- open this to use the tool.
    Value: !Sub "https://${FrontendDistribution.DomainName}"
  FrontendDistributionId:
    Description: >
      CloudFront distribution ID -- infra/deploy.sh uses this to invalidate
      the cache after syncing frontend/web/, so updates show up immediately.
    Value: !Ref FrontendDistribution
  OpenAIApiKeySecretArn:
    Description: >
      Secrets Manager secret ARN for the OpenAI key -- pass to
      infra/set_openai_key.sh (or populate via the console/CLI directly).
    Value: !Ref OpenAIApiKeySecret
