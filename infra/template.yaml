AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  API Gateway + Lambda + S3 for the BSBA Freshman Scheduling Tool.
  AdvisorFunction serves the schedule "what-if" advisor (OpenAI-backed,
  grounded in a precomputed degree-roadmap/prerequisite dataset stored in
  DataBucket -- see api/handlers/advisor.py and advisor/roadmap.py).
  FrontendBucket hosts the static site in frontend/web/ (schedule_engine
  artifacts + the advisor UI). CodeUri is the repo root so the Lambda can
  import the sibling `advisor`/`mining` packages unchanged.

Parameters:
  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    Description: >
      OpenAI model invoked by advisor/llm_openai.py. Overridable per-stage
      without a redeploy of application code.

Globals:
  Function:
    Runtime: python3.13
    CodeUri: ../
    Timeout: 30
    MemorySize: 512
  Api:
    # Preflight (OPTIONS) support for the static frontend in frontend/web/,
    # which calls this API cross-origin from FrontendBucket's website
    # endpoint. The actual GET/POST responses still need
    # Access-Control-Allow-Origin set by the Lambda itself (Lambda proxy
    # integration doesn't inject headers into non-preflight responses) — see
    # CORS_HEADERS in api/handlers/advisor.py.
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type'"
      AllowMethods: "'GET,POST,OPTIONS'"
    # Cheap defense-in-depth against automated prompt-injection probing or
    # runaway cost (each request calls the OpenAI API, which is billed):
    # caps the whole stage well above normal interactive use.
    MethodSettings:
      - ResourcePath: "/*"
        HttpMethod: "*"
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10

Resources:
  # Precomputed data AdvisorFunction reads at call time via boto3 (see
  # api/handlers/_data.py) instead of bundling it into the Lambda zip:
  # roadmap_advisor.json (advisor/build_data.py) and, for the local-only
  # Streamlit tool's benefit, recommendation.json (mining/co_occurrence.py).
  # Private -- only the Lambda's execution role can read it.
  DataBucket:
    Type: AWS::S3::Bucket

  # Static hosting for frontend/web/ (schedule_engine artifacts + the
  # advisor UI). Public read + website hosting since this is a public-facing
  # staff/student tool with no auth in front of it yet (see CORS note above).
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # Holds the OpenAI API key. Created with a placeholder value -- the real
  # key is never a CloudFormation parameter (which would persist it in the
  # stack's parameter history). Populate it once, out-of-band, with
  # infra/set_openai_key.sh after the first deploy.
  OpenAIApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: >
        OpenAI API key for AdvisorFunction. Populate with
        infra/set_openai_key.sh -- never put the real key in this template.
      SecretString: '{"OPENAI_API_KEY":"REPLACE_ME"}'

  AdvisorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api.handlers.advisor.handler
      Environment:
        Variables:
          OPENAI_MODEL: !Ref OpenAIModel
          OPENAI_SECRET_ARN: !Ref OpenAIApiKeySecret
          DATA_BUCKET: !Ref DataBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref OpenAIApiKeySecret
        - Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub "${DataBucket.Arn}/*"
      Events:
        PostAdvisor:
          Type: Api
          Properties:
            Path: /advisor
            Method: post

Outputs:
  ApiUrl:
    Description: Base invoke URL for the deployed stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  DataBucketName:
    Description: >
      S3 bucket holding precomputed data (roadmap_advisor.json,
      recommendation.json) that AdvisorFunction/local tools read.
      infra/deploy.sh uploads to it.
    Value: !Ref DataBucket
  FrontendBucketName:
    Description: S3 bucket for the static frontend. infra/deploy.sh syncs frontend/web/ here.
    Value: !Ref FrontendBucket
  FrontendWebsiteUrl:
    Description: Static website endpoint for the frontend -- open this URL to use the tool.
    Value: !GetAtt FrontendBucket.WebsiteURL
  OpenAIApiKeySecretArn:
    Description: >
      Secrets Manager secret ARN for the OpenAI key -- pass to
      infra/set_openai_key.sh (or populate via the console/CLI directly).
    Value: !Ref OpenAIApiKeySecret
