AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  API Gateway + Lambda layer for the BS Business Administration Freshman
  Scheduling Tool. Serves the precomputed mining/Bedrock output as JSON
  (see README.md architecture diagram). CodeUri is the repo root so both
  Lambdas can import the sibling `mining` and `bedrock` packages unchanged.

Parameters:
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: >
      Bedrock model ID invoked by bedrock/client.py. Overridable per-stage
      without a redeploy of application code.

Globals:
  Function:
    Runtime: python3.13
    CodeUri: ../
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        BEDROCK_MODEL_ID: !Ref BedrockModelId

Resources:
  RecommendationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api.handlers.recommendation.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
      Events:
        GetRecommendation:
          Type: Api
          Properties:
            Path: /recommendation
            Method: get

  AskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api.handlers.ask.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
      Events:
        PostAsk:
          Type: Api
          Properties:
            Path: /ask
            Method: post

Outputs:
  ApiUrl:
    Description: Base invoke URL for the deployed stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
